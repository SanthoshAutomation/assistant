<!DOCTYPE html>
<html>
<head>
  <!--
    Build for subdirectory hosting:
      flutter build web --base-href /assistant/
    Then upload build/web/ contents to public_html/assistant/ on Hostinger.
    The $FLUTTER_BASE_HREF placeholder is replaced automatically by the build.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="My personal assistant — notes, todos, calendar.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- iOS meta -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="My Assistant">

  <title>My Assistant</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      margin: 0;
      background-color: #ffffff;
    }
  </style>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
