name: assistant
description: Personal assistant app — notes, todos, calendar, alarms with local SQLite and cloud sync.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Shared — web + mobile
  table_calendar: ^3.1.2
  intl: ^0.19.0
  http: ^1.2.2
  uuid: ^4.4.2
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  cupertino_icons: ^1.0.8
  # Mobile only — conditionally imported via platform stubs, safe in pubspec for web builds
  sqflite: ^2.3.3
  path: ^1.9.0
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4
  flutter_timezone: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
